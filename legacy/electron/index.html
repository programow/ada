<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ada</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    #status {
      text-align: center;
    }
    #status .icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    #status .label {
      font-size: 1rem;
      opacity: 0.7;
    }
    .recording .icon {
      color: #e74c3c;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="status">
    <div class="icon" id="icon">🎙</div>
    <div class="label" id="label">Ctrl+Shift+Space to speak</div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
