name: Provider smoke test

# Runs each configured STT provider against the hello-world.wav fixture so
# we catch silent server-side API deprecations (param renames, retired model
# ids, etc.) before users hit them. Providers whose secret isn't set are
# skipped; the workflow only fails on real API errors.
#
# To enable for a provider, add a repo secret named SMOKE_<PROVIDER>_KEY and
# wire it in the env block below. Suggested rotation: quarterly.

on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC daily
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/desktop/src/providers/**'
      - 'packages/desktop/tests/provider-smoke/**'
      - '.github/workflows/provider-smoke.yml'

concurrency:
  group: provider-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Hit every STT provider with one transcription
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run provider smoke test
        run: bun --cwd packages/desktop run smoke:providers
        env:
          OPENAI_API_KEY: ${{ secrets.SMOKE_OPENAI_KEY }}
          GROQ_API_KEY: ${{ secrets.SMOKE_GROQ_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.SMOKE_ASSEMBLYAI_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.SMOKE_DEEPGRAM_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.SMOKE_ELEVENLABS_KEY }}
          FAL_KEY: ${{ secrets.SMOKE_FAL_KEY }}
          GLADIA_API_KEY: ${{ secrets.SMOKE_GLADIA_KEY }}
          REVAI_API_KEY: ${{ secrets.SMOKE_REVAI_KEY }}
