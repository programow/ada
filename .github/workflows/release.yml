name: Release

# Fires when you publish a GitHub release (Releases → Draft → Publish).
# Tag releases as v<SemVer> (e.g. v0.1.0) — the tag drives the asset URL
# pattern that the landing's manifest resolves to.
#
# Also exposes a manual trigger so you can test-fire the pipeline against
# any branch from the Actions tab without cutting a real release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to label this dry-run with (e.g. v0.0.1-test). On `release` triggers this is derived from the release tag."
        required: true
        default: "v0.0.0-test"

# Never cancel an in-flight release — a half-published release is worse than
# a queued one.
concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write # tauri-action needs this to attach bundles to the GH release

jobs:
  build:
    name: Build & upload / ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        # `rust-toolchain` is per-platform because the constraints differ:
        #   - macOS + Windows compile cleanly on stable; pinning would break
        #     them with MSRV walls from `darling` and others.
        #   - Linux trips a `glib v0.18.5` trait-solver bug on current stable
        #     (~1.91), so it needs an older toolchain — but still >= 1.88 to
        #     clear the `darling@0.23.0` MSRV and >= 1.85 for `edition2024`.
        platform:
          - name: macos-universal
            os: macos-14
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            rust-toolchain: stable
          - name: linux-x86_64
            os: ubuntu-22.04
            args: ""
            rust-targets: ""
            rust-toolchain: "1.88.0"
          - name: windows-x86_64
            os: windows-latest
            args: ""
            rust-targets: ""
            rust-toolchain: stable
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.platform.rust-toolchain }}
          targets: ${{ matrix.platform.rust-targets }}

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock', 'packages/desktop/src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install Linux build deps
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            libasound2-dev \
            libxdo-dev \
            pkg-config \
            build-essential

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # macOS-only: materialize the App Store Connect API key from the secret
      # and export the env vars notarytool needs. tauri-action picks up
      # APPLE_API_ISSUER/KEY/KEY_PATH from the env automatically.
      - name: Set up notarization API key (macOS)
        if: matrix.platform.os == 'macos-14'
        env:
          KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          mkdir -p ~/private_keys
          echo "$KEY_CONTENT" | base64 --decode > ~/private_keys/AuthKey_$KEY_ID.p8
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey_$KEY_ID.p8" >> $GITHUB_ENV
          echo "APPLE_API_KEY=$KEY_ID" >> $GITHUB_ENV
          echo "APPLE_API_ISSUER=$ISSUER" >> $GITHUB_ENV

      # Builds the bundles for the current platform. We deliberately do NOT
      # pass `releaseId` here: tauri-action would upload immediately, but the
      # macOS DMG still needs stapling. The dedicated upload step below runs
      # after stapling.
      #
      # On macOS, tauri-action imports the .p12 into a temp keychain when
      # APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
      # are set, and notarizes + staples the inner .app using the API key env
      # vars set above. The DMG wrapper is stapled in the next step.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          projectPath: packages/desktop
          args: ${{ matrix.platform.args }}

      # Tauri's bundler doesn't notarize the DMG wrapper (only the inner .app).
      # This script submits the DMG to Apple, staples the ticket, and verifies.
      - name: Notarize and staple DMG (macOS)
        if: matrix.platform.os == 'macos-14'
        working-directory: packages/desktop
        run: ./scripts/notarize-staple-dmg.sh

      # Upload all platform bundles to the GitHub release. Runs only on real
      # `release` events; workflow_dispatch builds don't publish anywhere.
      - name: Upload bundles to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(
            packages/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            packages/desktop/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/release/bundle/rpm/*.rpm
            packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "no bundles found to upload"
            exit 0
          fi
          gh release upload "$TAG" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"

  # Generates a latest.json manifest describing the just-published release's
  # per-platform download URLs and attaches it to the GH release. The landing
  # fetches it at runtime — see packages/landing/src/lib/manifest.ts.
  publish-manifest:
    name: Publish latest.json
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Build manifest from release assets
        run: |
          set -euo pipefail
          # Enumerate the asset filenames tauri-action attached to this release.
          # Pick the first match per platform pattern; fields with no match
          # serialize as JSON null (so the landing renders "Coming soon").
          assets=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
          pick() { echo "$assets" | grep -E "$1" | head -n1 || true; }
          mac=$(pick '\.dmg$')
          win=$(pick '\.msi$|-setup\.exe$')
          lin=$(pick '\.AppImage$')

          # Emit a JSON value: either `null` or a JSON-quoted URL string.
          # `jq -n` (no -r) writes valid JSON, which feeds straight into
          # `--argjson` below.
          url_for() {
            if [[ -z "$1" ]]; then
              echo null
            else
              jq -n --arg t "$TAG" --arg f "$1" --arg repo "$GITHUB_REPOSITORY" \
                '"https://github.com/" + $repo + "/releases/download/" + $t + "/" + ($f | @uri)'
            fi
          }

          jq -n \
            --arg version "${TAG#v}" \
            --argjson mac "$(url_for "$mac")" \
            --argjson win "$(url_for "$win")" \
            --argjson linux "$(url_for "$lin")" \
            '{version: $version, mac: $mac, win: $win, linux: $linux}' > latest.json
          cat latest.json

      - name: Attach manifest to GitHub release
        run: gh release upload "$TAG" latest.json --clobber --repo "$GITHUB_REPOSITORY"
